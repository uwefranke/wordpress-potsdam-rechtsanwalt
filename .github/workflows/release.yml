name: WordPress Theme Release

on:
  push:
    tags:
      - 'v*.*.*'  # Wird ausgelöst bei Tags wie v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # Erlaubt manuelles Auslösen

jobs:
  build-and-release:
    name: Theme-Paket erstellen und veröffentlichen
    runs-on: ubuntu-latest
    
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        
      - name: Theme-Version ermitteln
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(date +'%Y%m%d-%H%M%S')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Theme Version: $VERSION"
      
      - name: Theme-Paket vorbereiten
        run: |
          THEME_NAME="potsdam-rechtsanwalt"
          BUILD_DIR="build/$THEME_NAME"
          
          # Build-Verzeichnis erstellen
          mkdir -p $BUILD_DIR
          
          # Theme-Dateien aus src/ kopieren
          cp -r src/* $BUILD_DIR/
          
          # Version in style.css aktualisieren
          sed -i "s/Version: .*/Version: ${{ steps.version.outputs.version }}/" $BUILD_DIR/style.css
          
          echo "Theme-Dateien vorbereitet in $BUILD_DIR"
      
      - name: ZIP-Archiv erstellen
        run: |
          cd build
          zip -r ../potsdam-rechtsanwalt-theme-v${{ steps.version.outputs.version }}.zip potsdam-rechtsanwalt
          cd ..
          
          # Dateigröße anzeigen
          ls -lh potsdam-rechtsanwalt-theme-v${{ steps.version.outputs.version }}.zip
      
      - name: Prüfsumme erstellen
        run: |
          sha256sum potsdam-rechtsanwalt-theme-v${{ steps.version.outputs.version }}.zip > potsdam-rechtsanwalt-theme-v${{ steps.version.outputs.version }}.zip.sha256
          cat potsdam-rechtsanwalt-theme-v${{ steps.version.outputs.version }}.zip.sha256
      
      - name: Release erstellen
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            potsdam-rechtsanwalt-theme-v${{ steps.version.outputs.version }}.zip
            potsdam-rechtsanwalt-theme-v${{ steps.version.outputs.version }}.zip.sha256
          body: |
            ## WordPress Theme: Potsdam Rechtsanwalt v${{ steps.version.outputs.version }}
            
            ### Installation
            
            1. Laden Sie die ZIP-Datei herunter
            2. In WordPress: **Design → Themes → Installieren → Theme hochladen**
            3. ZIP-Datei auswählen und installieren
            4. Theme aktivieren
            
            ### Änderungen
            
            Details siehe [CHANGELOG.md](CHANGELOG.md)
            
            ### Prüfsumme
            
            Die SHA-256 Prüfsumme finden Sie in der `.sha256` Datei.
            
            ### Dokumentation
            
            - [README.md](README.md) - Theme-Dokumentation
            - [INSTALLATION.md](INSTALLATION.md) - Installations-Anleitung
            
            ---
            
            **Theme-Version:** ${{ steps.version.outputs.version }}  
            **WordPress:** 5.0+  
            **PHP:** 7.4+
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Artifact hochladen (für manuelle Workflows)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: potsdam-rechtsanwalt-theme-v${{ steps.version.outputs.version }}
          path: potsdam-rechtsanwalt-theme-v${{ steps.version.outputs.version }}.zip
          retention-days: 30
