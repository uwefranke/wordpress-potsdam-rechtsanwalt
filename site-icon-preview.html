<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Site Icon - 512x512px</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        .container {
            text-align: center;
        }
        svg {
            display: block;
            margin: 20px auto;
            border: 2px solid #ccc;
        }
        .info {
            font-family: Arial, sans-serif;
            color: #333;
            margin-top: 20px;
        }
        button {
            background: #1a3a5c;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            margin: 10px;
        }
        button:hover {
            background: #2a4a6c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Site Icon für WordPress</h1>
        <svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" id="siteIcon">
            <!-- Hintergrund: Navy Blau -->
            <rect width="512" height="512" fill="#1a3a5c" rx="80"/>
            
            <!-- Goldener Rahmen -->
            <rect x="40" y="40" width="432" height="432" fill="none" stroke="#d4af37" stroke-width="8" rx="40"/>
            
            <!-- Waage-Symbol (Justitia) in Gold -->
            <g fill="#d4af37">
                <!-- Waagbalken -->
                <rect x="156" y="248" width="200" height="12" rx="6"/>
                
                <!-- Mittelsäule -->
                <rect x="250" y="180" width="12" height="140" rx="6"/>
                
                <!-- Linke Waagschale -->
                <ellipse cx="186" cy="280" rx="45" ry="8" opacity="0.8"/>
                <path d="M 141 280 Q 141 260, 156 260 L 216 260 Q 231 260, 231 280" 
                      fill="none" stroke="#d4af37" stroke-width="8" stroke-linecap="round"/>
                <line x1="186" y1="248" x2="186" y2="260" stroke="#d4af37" stroke-width="6"/>
                
                <!-- Rechte Waagschale -->
                <ellipse cx="326" cy="280" rx="45" ry="8" opacity="0.8"/>
                <path d="M 281 280 Q 281 260, 296 260 L 356 260 Q 371 260, 371 280" 
                      fill="none" stroke="#d4af37" stroke-width="8" stroke-linecap="round"/>
                <line x1="326" y1="248" x2="326" y2="260" stroke="#d4af37" stroke-width="6"/>
                
                <!-- Basis -->
                <rect x="220" y="320" width="72" height="16" rx="8"/>
                <rect x="240" y="336" width="32" height="8" rx="4"/>
            </g>
            
            <!-- Initialen "ML" (Matthias Lange) -->
            <text x="256" y="420" font-family="Georgia, serif" font-size="64" 
                  fill="#d4af37" text-anchor="middle" opacity="0.6" font-weight="bold">ML</text>
        </svg>
        
        <div class="info">
            <p><strong>Größe:</strong> 512 × 512 Pixel</p>
            <button onclick="downloadAsPNG()">Als PNG herunterladen</button>
            <p style="font-size: 12px; color: #666; margin-top: 20px;">
                Oder: Rechtsklick auf das Icon → "Bild speichern unter..." → Als PNG speichern
            </p>
        </div>
    </div>

    <script>
        function downloadAsPNG() {
            const svg = document.getElementById('siteIcon');
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            const data = new XMLSerializer().serializeToString(svg);
            const blob = new Blob([data], {type: 'image/svg+xml'});
            const url = URL.createObjectURL(blob);
            
            const img = new Image();
            img.onload = function() {
                ctx.drawImage(img, 0, 0);
                canvas.toBlob(function(pngBlob) {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(pngBlob);
                    a.download = 'site-icon-512x512.png';
                    a.click();
                }, 'image/png');
            };
            img.src = url;
        }
    </script>
</body>
</html>
